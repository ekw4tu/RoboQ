<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Quiz</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;  /* Prevent additional scrollbars */
        }
        .content {
            height: 100%;
            overflow-y: auto;  /* Single scrollbar for content */
            padding: 0 10px 10px 10px;
            
        }
        .content h1 {
            margin-top: 0;  /* Remove upper margin */
        }
        .correct {
            background-color: lightgreen;
        }
        .incorrect {
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Questions for page {{pagenum}}</h1>
        <form id="quiz-form">
            {% for question in questions %}
                {% set question_index = loop.index %}
                <div id="question{{ question_index }}">
                    <p>{{question_index}}. {{ question.text }}</p>
                    {% for option in question.options %}
                        <input type="radio" name="question{{ question_index }}" value="{{ option }}">
                        <label>{{ option }}</label><br>
                    {% endfor %}
                </div>
            {% endfor %}
            <br>
            <input type="button" value="Check answers" onclick="checkAnswers()">
        </form>
    </div>

    <script>
        const answers = {{ questions | tojson }};
        
        function checkAnswers() {
            answers.forEach((question, index) => {
                const questionDiv = document.getElementById(`question${index + 1}`);
                const selectedOption = document.querySelector(`input[name="question${index + 1}"]:checked`);
                
                if (selectedOption) {
                    if (selectedOption.value === question.answer) {
                        questionDiv.classList.add('correct');
                        questionDiv.classList.remove('incorrect');
                    } else {
                        questionDiv.classList.add('incorrect');
                        questionDiv.classList.remove('correct');
                    }
                } else {
                    questionDiv.classList.remove('correct');
                    questionDiv.classList.remove('incorrect');
                }
            });
        }
    </script>
</body>
</html>
